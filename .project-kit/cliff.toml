# git-cliff configuration — managed by project-kit.
#
# Lives at .project-kit/cliff.toml (NOT the repo root). Every git-cliff
# invocation passes `--config .project-kit/cliff.toml` explicitly, so this file
# is found regardless of the missing root cliff.toml.
#
# Renders Keep-a-Changelog-shaped output from git history. Designed to coexist
# with the LLM-drafted GitHub release notes: this file produces the mechanical
# CHANGELOG.md; release.py produces the editorial release body.
#
# Usage (all forms point --config at this file):
#   uvx git-cliff@latest --config .project-kit/cliff.toml
#   uvx git-cliff@latest --config .project-kit/cliff.toml --output CHANGELOG.md
#   uvx git-cliff@latest --config .project-kit/cliff.toml --tag v0.3.0 --unreleased --prepend CHANGELOG.md
#
# `just changelog` and `release.py` invoke these forms for you.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim | upper_first }}\
{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}\
{% endfor %}

"""
footer = ""
trim = true
postprocessors = []

[git]
# Don't drop commits that don't match conventional-commits prefixes.
# Unmatched commits land in the "Other" group via the catch-all parser below.
conventional_commits = false
filter_unconventional = false
split_commits = false

# Skip the noisiest mechanical commits entirely. These never carry user-visible
# meaning, and including them dilutes the changelog. Add patterns here over
# time as repo-specific noise accumulates.
commit_preprocessors = [
  # Strip trailing co-author tags from squash-merge bodies.
  { pattern = '\n\nCo-authored-by:.*', replace = "" },
  # Strip "Signed-off-by" trailers.
  { pattern = '\n\nSigned-off-by:.*', replace = "" },
]

# Commit-message regex → CHANGELOG group. Order matters; first match wins.
commit_parsers = [
  { message = "^[Mm]erge ",                                   skip = true },
  { message = "^(chore|ci)\\(release\\)",                     skip = true },
  { message = "^chore: release v?\\d",                        skip = true },
  { message = "^(chore|ci): bump version",                    skip = true },

  { message = "^[Ff]eat(\\(.*\\))?:",                         group = "Added" },
  { message = "^[Aa]dd(\\(.*\\))?:",                          group = "Added" },

  { message = "^[Ff]ix(\\(.*\\))?:",                          group = "Fixed" },
  { message = "^[Bb]ugfix(\\(.*\\))?:",                       group = "Fixed" },

  { message = "^[Pp]erf(\\(.*\\))?:",                         group = "Changed" },
  { message = "^[Rr]efactor(\\(.*\\))?:",                     group = "Changed" },
  { message = "^[Cc]hange(\\(.*\\))?:",                       group = "Changed" },
  { message = "^[Uu]pdate(\\(.*\\))?:",                       group = "Changed" },

  { message = "^[Dd]oc[s]?(\\(.*\\))?:",                      group = "Documentation" },

  { message = "^[Ss]ec(urity)?(\\(.*\\))?:",                  group = "Security" },

  { message = "^[Rr]emove(\\(.*\\))?:",                       group = "Removed" },
  { message = "^[Dd]elete(\\(.*\\))?:",                       group = "Removed" },

  { message = "^[Dd]eprecate(\\(.*\\))?:",                    group = "Deprecated" },

  # Catch-all — anything left lands in Other.
  { message = ".*",                                           group = "Other" },
]

# Don't include commits that touched only these paths.
commit_parsers_skip = []

# Tag regex: any v-prefixed semver, including pre-release suffixes.
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+(-[A-Za-z0-9.-]+)?"

# Sort newest first within each version section.
sort_commits = "newest"
topo_order = false
